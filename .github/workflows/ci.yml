name: Validate foundations

on:
  pull_request:
    branches: [main, sprint-0/foundations]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundations-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Validate content, types, tests and build
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v7
        with:
          name: sprint-0-package-lock
          path: package-lock.json
          if-no-files-found: error

      - name: Upload production build
        uses: actions/upload-artifact@v7
        with:
          name: gargotte-adventure-dist
          path: dist
          if-no-files-found: error
