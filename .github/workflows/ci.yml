name: Validate application

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Generate Prettier repair patch
        if: failure()
        run: |
          npm run format
          git diff --binary > prettier.patch

      - name: Upload Prettier repair patch
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: prettier-repair-patch
          path: prettier.patch
          if-no-files-found: error

      - name: Validate content
        run: npm run validate:content

      - name: TypeScript strict check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Validate repository
        run: python tools/validate_repository.py

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser smoke tests
        run: npm run test:e2e

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-diagnostics
          path: |
            test-results
            playwright-report
          if-no-files-found: warn

      - name: Upload package lock
        uses: actions/upload-artifact@v7
        with:
          name: package-lock
          path: package-lock.json
          if-no-files-found: error

      - name: Upload production build
        uses: actions/upload-artifact@v7
        with:
          name: gargotte-adventure-dist
          path: dist
          if-no-files-found: error
