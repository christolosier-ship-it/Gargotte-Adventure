name: Repository quality

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  foundations:
    name: Validate foundations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Validate structure and secrets
        shell: bash
        run: |
          set +e
          python tools/validate_repository.py 2>&1 | tee repository-validation.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload repository diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: repository-diagnostics
          path: repository-validation.log
          if-no-files-found: error
